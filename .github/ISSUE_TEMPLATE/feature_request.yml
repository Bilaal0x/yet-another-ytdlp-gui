name: Feature request
description: Suggest a new capability or improvement.
title: "feature: "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Focus on the user need first; the implementation can follow.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do and what is currently difficult or missing?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
      placeholder: The app should...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround or different approach you considered.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI
        - Download handling
        - Backend / commands
        - Build / packaging
        - Documentation
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to the project right now?
      options:
        - Nice to have
        - Important
        - Blocking
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this request.
          required: true
