name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "bug: "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Clear reproduction steps make fixes much faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen instead.
      placeholder: The app...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the problem.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste relevant logs, terminal output or screenshots if available.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI
        - Download handling
        - Backend / commands
        - Build / packaging
        - Documentation
        - Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: App version, release or commit SHA if known.
      placeholder: v0.1.0 or c2e4a1d
    validations:
      required: false

  - type: input
    id: platform
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this report.
          required: true
